<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doc Reader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        *{margin:0;padding:0;box-sizing:border-box}

        :root {
            --accent: #7C5CFC;
            --accent2: #A78BFA;
            --accent3: #6366F1;
            --surface: rgba(255,255,255,0.03);
            --surface-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(124,92,252,0.3);
            --text-1: #F0F0F5;
            --text-2: #A0A0B8;
            --text-3: #6B6B80;
            --text-4: #3A3A4A;
            --bg: #08080D;
            --card-glass: rgba(14,14,22,0.6);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ═══════ Animated background ═══════ */
        .bg-canvas {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }

        /* Dot grid */
        .dot-grid {
            position: absolute; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 40%, black 30%, transparent 80%);
        }

        /* Floating gradient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0;
            animation: orbFadeIn 2s ease forwards;
        }
        .orb-1 {
            width: 500px; height: 500px;
            top: -10%; left: 15%;
            background: radial-gradient(circle, rgba(124,92,252,0.15), transparent 70%);
            animation-delay: 0.2s;
        }
        .orb-1 { animation: orbFadeIn 2s ease 0.2s forwards, orbFloat1 20s ease-in-out 2s infinite; }
        .orb-2 {
            width: 400px; height: 400px;
            top: 30%; right: -5%;
            background: radial-gradient(circle, rgba(99,102,241,0.12), transparent 70%);
        }
        .orb-2 { animation: orbFadeIn 2s ease 0.5s forwards, orbFloat2 25s ease-in-out 2s infinite; }
        .orb-3 {
            width: 350px; height: 350px;
            bottom: -5%; left: 35%;
            background: radial-gradient(circle, rgba(167,139,250,0.1), transparent 70%);
        }
        .orb-3 { animation: orbFadeIn 2s ease 0.8s forwards, orbFloat3 22s ease-in-out 2s infinite; }

        @keyframes orbFadeIn { to { opacity: 1; } }
        @keyframes orbFloat1 {
            0%,100%{ transform: translate(0,0); }
            33%{ transform: translate(40px,-30px); }
            66%{ transform: translate(-20px,20px); }
        }
        @keyframes orbFloat2 {
            0%,100%{ transform: translate(0,0); }
            33%{ transform: translate(-30px,40px); }
            66%{ transform: translate(20px,-25px); }
        }
        @keyframes orbFloat3 {
            0%,100%{ transform: translate(0,0); }
            33%{ transform: translate(25px,30px); }
            66%{ transform: translate(-35px,-15px); }
        }

        /* Mouse-following light */
        .cursor-light {
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124,92,252,0.06), transparent 60%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: left 0.6s cubic-bezier(0.16,1,0.3,1), top 0.6s cubic-bezier(0.16,1,0.3,1);
            will-change: left, top;
        }

        /* ═══════ Title bar ═══════ */
        .titlebar {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 8px;
            -webkit-app-region: drag;
            flex-shrink: 0;
            position: relative; z-index: 10;
        }
        .titlebar-btns { display: flex; gap: 2px; -webkit-app-region: no-drag; }
        .titlebar-btn {
            width: 32px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; color: #4A4A5A;
            cursor: pointer; border-radius: 6px;
            transition: all 180ms ease;
        }
        .titlebar-btn:hover { background: rgba(255,255,255,0.06); color: #A0A0B8; }
        .titlebar-btn.close:hover { background: #E53935; color: #fff; }
        .titlebar-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* ═══════ Main layout ═══════ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 0 24px 40px;
            position: relative;
            z-index: 1;
        }
        .main::-webkit-scrollbar { width: 4px; }
        .main::-webkit-scrollbar-track { background: transparent; }
        .main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

        /* ═══════ Animations ═══════ */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(28px) scale(0.97); filter: blur(4px); }
            to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes revealScale {
            from { opacity: 0; transform: scale(0.5) rotate(-8deg); filter: blur(8px); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes ringPulse {
            0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%,-50%) scale(1.15); opacity: 0; }
        }
        @keyframes ringRotate {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to   { transform: translate(-50%,-50%) rotate(360deg); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-6px); }
        }
        @keyframes borderGlow {
            0%,100% { opacity: 0.5; }
            50%     { opacity: 1; }
        }

        /* ═══════ Header ═══════ */
        .header {
            position: relative; z-index: 1;
            text-align: center;
            padding-top: 40px;
            margin-bottom: 32px;
        }

        /* Logo container */
        .logo-wrap {
            position: relative;
            width: 80px; height: 80px;
            margin: 0 auto 24px;
            opacity: 0;
            animation: revealScale 800ms cubic-bezier(0.16, 1, 0.3, 1) 300ms forwards;
        }

        /* Animated ring around logo */
        .logo-ring {
            position: absolute;
            top: 50%; left: 50%;
            width: 90px; height: 90px;
            transform: translate(-50%,-50%);
            border-radius: 50%;
            border: 1px solid transparent;
            background: conic-gradient(from 0deg, transparent, rgba(124,92,252,0.4), transparent, rgba(167,139,250,0.3), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: ringRotate 8s linear infinite;
        }
        .logo-ring-pulse {
            position: absolute;
            top: 50%; left: 50%;
            width: 90px; height: 90px;
            transform: translate(-50%,-50%);
            border-radius: 50%;
            border: 1px solid rgba(124,92,252,0.2);
            animation: ringPulse 3s ease-in-out infinite;
        }

        .logo-mark {
            width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            border-radius: 22px;
            background: linear-gradient(145deg, rgba(124,92,252,0.15), rgba(99,102,241,0.08));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(124,92,252,0.2);
            overflow: hidden;
        }
        .logo-mark::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(124,92,252,0.2) 0%, transparent 50%);
            border-radius: inherit;
        }
        .logo-mark::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: ringRotate 6s linear infinite;
        }
        .logo-mark svg {
            position: relative; z-index: 1;
            width: 32px; height: 32px;
            stroke: rgba(255,255,255,0.9); stroke-width: 1.8; fill: none;
            filter: drop-shadow(0 0 8px rgba(124,92,252,0.4));
        }

        /* Title */
        .title-row {
            opacity: 0;
            animation: revealUp 700ms cubic-bezier(0.16, 1, 0.3, 1) 550ms forwards;
        }
        .header h1 {
            font-size: 28px; font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(
                90deg,
                #E8E8ED 0%, #A78BFA 25%, #7C5CFC 50%, #A78BFA 75%, #E8E8ED 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 6s linear infinite;
        }
        .header .subtitle {
            font-size: 13px; color: var(--text-3);
            margin-top: 8px; letter-spacing: 2px;
            font-weight: 400;
        }

        /* Feature pills */
        .feature-pills {
            display: flex; gap: 8px;
            justify-content: center;
            margin-top: 16px;
            opacity: 0;
            animation: revealUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 750ms forwards;
        }
        .pill {
            font-size: 11px; font-weight: 500;
            padding: 5px 12px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-3);
            display: flex; align-items: center; gap: 5px;
            transition: all 300ms ease;
        }
        .pill:hover { border-color: var(--border-hover); color: var(--text-2); background: var(--surface-hover); }
        .pill svg { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2; fill: none; opacity: 0.7; }

        /* ═══════ Actions ═══════ */
        .actions {
            position: relative; z-index: 1;
            display: flex; gap: 14px;
            margin-bottom: 36px;
            opacity: 0;
            animation: revealUp 700ms cubic-bezier(0.16, 1, 0.3, 1) 900ms forwards;
        }

        .btn-primary {
            position: relative;
            padding: 12px 32px;
            font-size: 13.5px; font-weight: 600; font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            border: none; border-radius: 14px;
            cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            transition: all 250ms cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow:
                0 0 0 1px rgba(124,92,252,0.3),
                0 4px 24px rgba(124,92,252,0.2),
                inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 50%);
            border-radius: inherit;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 500ms ease;
        }
        .btn-primary:hover::after { left: 100%; }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow:
                0 0 0 1px rgba(124,92,252,0.5),
                0 8px 40px rgba(124,92,252,0.35),
                0 2px 8px rgba(124,92,252,0.2),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .btn-primary:active { transform: translateY(0) scale(0.97); transition-duration: 100ms; }
        .btn-primary svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

        .btn-secondary {
            position: relative;
            padding: 12px 32px;
            font-size: 13.5px; font-weight: 500; font-family: inherit;
            color: var(--text-2);
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            transition: all 250ms cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        .btn-secondary::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: left 500ms ease;
        }
        .btn-secondary:hover::after { left: 100%; }
        .btn-secondary:hover {
            background: var(--surface-hover);
            color: var(--text-1);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .btn-secondary:active { transform: scale(0.97); transition-duration: 100ms; }
        .btn-secondary svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* ═══════ Divider ═══════ */
        .section-divider {
            width: 100%; max-width: 640px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 24px;
            opacity: 0;
            animation: revealUp 500ms ease 1050ms forwards;
        }

        /* ═══════ Recent sessions ═══════ */
        .recent-section {
            position: relative; z-index: 1;
            width: 100%; max-width: 640px;
            opacity: 0;
            animation: revealUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 1100ms forwards;
        }

        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .section-title {
            font-size: 11px; font-weight: 600; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 2px;
        }
        .section-count {
            font-size: 11px; color: var(--text-4); font-weight: 500;
        }

        /* Session list */
        .session-list {
            display: flex; flex-direction: column; gap: 4px;
        }

        /* Session card - glassmorphism */
        .session-card {
            position: relative;
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px;
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: all 280ms cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }
        .session-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(124,92,252,0.06), transparent 60%);
            opacity: 0;
            transition: opacity 280ms ease;
            border-radius: inherit;
        }
        .session-card:hover::before { opacity: 1; }
        .session-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px) scale(1.005);
            box-shadow:
                0 8px 32px rgba(0,0,0,0.3),
                0 0 0 1px rgba(124,92,252,0.15);
        }

        .session-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            position: relative;
            transition: transform 280ms ease;
        }
        .session-card:hover .session-icon { transform: scale(1.08); }
        .session-icon svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
        .session-icon.pdf { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.15); }
        .session-icon.ppt { background: rgba(249, 115, 22, 0.1); color: #f97316; border: 1px solid rgba(249,115,22,0.15); }
        .session-icon.doc { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59,130,246,0.15); }

        .session-info { flex: 1; min-width: 0; position: relative; }
        .session-name {
            font-size: 13px; font-weight: 500; color: var(--text-1);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: color 200ms ease;
        }
        .session-card:hover .session-name { color: #fff; }
        .session-meta {
            font-size: 11px; color: var(--text-3);
            display: flex; gap: 10px; margin-top: 3px;
            font-weight: 400;
        }

        .session-badge {
            font-size: 10px; font-weight: 600;
            padding: 4px 10px; border-radius: 10px;
            background: rgba(124, 92, 252, 0.1);
            border: 1px solid rgba(124,92,252,0.15);
            color: var(--accent2);
            flex-shrink: 0; align-self: center;
            transition: all 200ms ease;
        }
        .session-card:hover .session-badge {
            background: rgba(124, 92, 252, 0.18);
            border-color: rgba(124,92,252,0.3);
        }

        .session-arrow {
            color: var(--text-4);
            transition: all 280ms cubic-bezier(0.16, 1, 0.3, 1);
            flex-shrink: 0;
        }
        .session-card:hover .session-arrow { color: var(--accent); transform: translateX(3px); }
        .session-arrow svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* Delete button */
        .session-delete {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none;
            color: transparent; cursor: pointer;
            border-radius: 8px;
            transition: all 180ms ease;
            flex-shrink: 0;
            position: relative;
        }
        .session-card:hover .session-delete { color: var(--text-4); }
        .session-delete:hover { color: #ef4444 !important; background: rgba(239,68,68,0.1); }
        .session-delete svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

        /* ═══════ Empty state ═══════ */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-4);
            opacity: 0;
            animation: revealUp 600ms cubic-bezier(0.16, 1, 0.3, 1) 1100ms forwards;
        }
        .empty-icon {
            width: 64px; height: 64px;
            margin: 0 auto 16px;
            border-radius: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }
        .empty-icon svg {
            width: 28px; height: 28px;
            stroke: var(--text-4); stroke-width: 1.5; fill: none;
        }
        .empty-state p {
            font-size: 13px; color: var(--text-3);
            line-height: 1.6;
        }

        /* ═══════ Version ═══════ */
        .version {
            position: fixed;
            bottom: 16px; right: 20px;
            font-size: 10px; color: var(--text-4);
            letter-spacing: 1.5px;
            font-weight: 500;
            z-index: 10;
        }

        /* ═══════ Page transition ═══════ */
        body.leaving .main {
            animation: pageLeave 500ms cubic-bezier(0.4, 0, 1, 1) forwards;
        }
        body.leaving .bg-canvas {
            animation: bgLeave 500ms ease forwards;
        }
        @keyframes pageLeave {
            to { opacity: 0; transform: translateY(-20px) scale(0.98); filter: blur(6px); }
        }
        @keyframes bgLeave {
            to { opacity: 0; }
        }

        /* ═══════ Stagger children in session list ═══════ */
        .session-card { opacity: 0; transform: translateY(12px); }
        .session-card.revealed {
            animation: revealUp 400ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* ═══════ Drop zone visual (when drag-hover) ═══════ */
        .drop-active .header {
            animation: float 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-canvas">
        <div class="dot-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="cursor-light" id="cursorLight"></div>

    <!-- Custom titlebar -->
    <div class="titlebar" data-tauri-drag-region>
        <div class="titlebar-btns">
            <button class="titlebar-btn" id="btnMin" title="最小化">
                <svg><line x1="5" y1="7" x2="9" y2="7"></line></svg>
            </button>
            <button class="titlebar-btn" id="btnMax" title="最大化">
                <svg><rect x="3" y="3" width="8" height="8" rx="1"></rect></svg>
            </button>
            <button class="titlebar-btn close" id="btnClose" title="关闭">
                <svg><line x1="4" y1="4" x2="10" y2="10"></line><line x1="10" y1="4" x2="4" y2="10"></line></svg>
            </button>
        </div>
    </div>

    <div class="main">
        <!-- Header / branding -->
        <div class="header">
            <div class="logo-wrap">
                <div class="logo-ring"></div>
                <div class="logo-ring-pulse"></div>
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                </div>
            </div>
            <div class="title-row">
                <h1>Doc Reader</h1>
                <p class="subtitle">智能文档阅读 · AI 笔记生成</p>
            </div>
            <div class="feature-pills">
                <span class="pill">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    PDF / PPTX / DOCX
                </span>
                <span class="pill">
                    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/></svg>
                    AI 笔记
                </span>
                <span class="pill">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                    多种模式
                </span>
            </div>
        </div>

        <!-- Action buttons -->
        <div class="actions">
            <button class="btn-primary" id="btnNewDoc">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                打开文档
            </button>
            <button class="btn-secondary" id="btnResumeLast">
                <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                恢复上次
            </button>
        </div>

        <div class="section-divider"></div>

        <!-- Recent sessions -->
        <div class="recent-section" id="recentSection" style="display:none;">
            <div class="section-header">
                <span class="section-title">历史工作区</span>
                <span class="section-count" id="sessionCount"></span>
            </div>
            <div class="session-list" id="sessionList"></div>
        </div>

        <!-- Empty state (no history) -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            </div>
            <p>暂无历史记录<br/>点击「打开文档」开始使用</p>
        </div>

        <span class="version">v0.1.0</span>
    </div>

    <script>
    (function () {
        /* ── Mouse-following light ── */
        var cursorLight = document.getElementById('cursorLight');
        document.addEventListener('mousemove', function (e) {
            cursorLight.style.left = e.clientX + 'px';
            cursorLight.style.top = e.clientY + 'px';
        });

        /* ── Tauri helpers ── */
        function invoke(cmd, args) {
            if (window.__TAURI__ && window.__TAURI__.core)
                return window.__TAURI__.core.invoke(cmd, args || {});
            if (window.__TAURI_INTERNALS__)
                return window.__TAURI_INTERNALS__.invoke(cmd, args || {});
            return Promise.reject('Tauri not available');
        }

        function getWindow() {
            if (window.__TAURI__ && window.__TAURI__.window)
                return window.__TAURI__.window.getCurrentWindow();
            return null;
        }

        function escapeHtml(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function navigateTo(url) {
            document.body.classList.add('leaving');
            setTimeout(function () { window.location.href = url; }, 420);
        }

        /* ── Window controls ── */
        document.getElementById('btnMin').addEventListener('click', function () {
            var w = getWindow(); if (w) w.minimize();
        });
        document.getElementById('btnMax').addEventListener('click', function () {
            var w = getWindow(); if (w) w.toggleMaximize();
        });
        document.getElementById('btnClose').addEventListener('click', function () {
            var w = getWindow(); if (w) w.close();
        });

        /* ── New document ── */
        document.getElementById('btnNewDoc').addEventListener('click', function () {
            navigateTo('/src/pages/doc_reader.html');
        });

        /* ── Resume last workspace ── */
        document.getElementById('btnResumeLast').addEventListener('click', function () {
            try {
                var raw = localStorage.getItem('dr_workspace');
                if (raw) {
                    var data = JSON.parse(raw);
                    if (data && data.sessionId) {
                        navigateTo('/src/pages/doc_reader.html?session=' + encodeURIComponent(data.sessionId));
                        return;
                    }
                }
            } catch (e) {}
            navigateTo('/src/pages/doc_reader.html');
        });

        /* ── Staggered card reveal ── */
        function revealCards() {
            var cards = document.querySelectorAll('.session-card');
            cards.forEach(function (card, i) {
                setTimeout(function () {
                    card.classList.add('revealed');
                }, i * 60);
            });
        }

        /* ── Load recent sessions ── */
        function loadSessions() {
            invoke('doc_reader_list_sessions', { limit: 10 })
                .then(function (res) {
                    var sessions = res.sessions || [];
                    var section = document.getElementById('recentSection');
                    var list = document.getElementById('sessionList');
                    var empty = document.getElementById('emptyState');
                    var countEl = document.getElementById('sessionCount');

                    if (sessions.length === 0) {
                        section.style.display = 'none';
                        empty.style.display = '';
                        return;
                    }

                    section.style.display = '';
                    empty.style.display = 'none';
                    countEl.textContent = sessions.length + ' 个文档';
                    list.innerHTML = '';

                    sessions.forEach(function (s) {
                        var ext = (s.filename || '').split('.').pop().toLowerCase();
                        var iconClass, iconSvg;
                        if (ext === 'pdf') {
                            iconClass = 'pdf';
                            iconSvg = '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>';
                        } else if (ext === 'pptx' || ext === 'ppt') {
                            iconClass = 'ppt';
                            iconSvg = '<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>';
                        } else {
                            iconClass = 'doc';
                            iconSvg = '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>';
                        }

                        var timeStr = '';
                        try {
                            timeStr = new Date(s.created_at).toLocaleDateString('zh-CN', {
                                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                            });
                        } catch (e) {}

                        var card = document.createElement('div');
                        card.className = 'session-card';
                        card.innerHTML =
                            '<div class="session-icon ' + iconClass + '">' + iconSvg + '</div>' +
                            '<div class="session-info">' +
                                '<div class="session-name">' + escapeHtml(s.filename) + '</div>' +
                                '<div class="session-meta"><span>' + s.page_count + ' 页</span><span>' + timeStr + '</span></div>' +
                            '</div>' +
                            (s.note_count > 0 ? '<span class="session-badge">' + s.note_count + ' 笔记</span>' : '') +
                            '<button class="session-delete" title="删除"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>' +
                            '<div class="session-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></div>';

                        card.addEventListener('click', function (e) {
                            if (e.target.closest('.session-delete')) return;
                            navigateTo('/src/pages/doc_reader.html?session=' + encodeURIComponent(s.session_id));
                        });

                        var delBtn = card.querySelector('.session-delete');
                        delBtn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            invoke('doc_reader_delete_session', { sessionId: s.session_id })
                                .then(function () {
                                    card.style.transition = 'all 300ms cubic-bezier(0.4, 0, 1, 1)';
                                    card.style.opacity = '0';
                                    card.style.transform = 'translateX(30px) scale(0.95)';
                                    card.style.filter = 'blur(4px)';
                                    setTimeout(function () {
                                        card.style.height = card.offsetHeight + 'px';
                                        card.offsetHeight; // force reflow
                                        card.style.height = '0';
                                        card.style.padding = '0 16px';
                                        card.style.margin = '0';
                                        card.style.border = 'none';
                                        card.style.overflow = 'hidden';
                                        setTimeout(function () {
                                            card.remove();
                                            var remaining = list.children.length;
                                            if (remaining === 0) {
                                                section.style.display = 'none';
                                                empty.style.display = '';
                                            }
                                            countEl.textContent = remaining + ' 个文档';
                                        }, 300);
                                    }, 280);
                                })
                                .catch(function (err) {
                                    console.error('删除会话失败:', err);
                                });
                        });

                        list.appendChild(card);
                    });

                    // Stagger reveal
                    requestAnimationFrame(revealCards);
                })
                .catch(function (err) {
                    console.log('[index] 加载会话列表失败:', err);
                    document.getElementById('emptyState').style.display = '';
                });
        }

        /* ── Init ── */
        loadSessions();

        try {
            var raw = localStorage.getItem('dr_workspace');
            if (!raw || !JSON.parse(raw).sessionId) {
                document.getElementById('btnResumeLast').style.display = 'none';
            }
        } catch (e) {
            document.getElementById('btnResumeLast').style.display = 'none';
        }
    })();
    </script>
</body>
</html>
